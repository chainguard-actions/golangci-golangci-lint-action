name: Test skip-cache with specific version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        run: |
          if command -v go &>/dev/null; then
            echo "Go already available: $(go version)"
          else
            curl -fsSL https://go.dev/dl/go1.21.13.linux-amd64.tar.gz -o /tmp/go.tar.gz
            sudo tar -C /usr/local -xzf /tmp/go.tar.gz
            echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          fi
      - id: action
        uses: .
        with:
          version: v2.3.0
          install-only: 'true'
          skip-cache: 'true'
          verify: 'false'
      - name: Assert specific version installed
        run: |
          # Reload PATH from GITHUB_PATH
          if [ -f "$GITHUB_PATH" ]; then
            while IFS= read -r dir; do
              export PATH="$dir:$PATH"
            done < "$GITHUB_PATH"
          fi
          # Find golangci-lint binary
          BINARY=""
          if command -v golangci-lint &>/dev/null; then
            BINARY="golangci-lint"
          else
            for loc in "$HOME/.local/bin/golangci-lint" "$HOME/go/bin/golangci-lint" "/usr/local/bin/golangci-lint" "/usr/bin/golangci-lint"; do
              if [ -x "$loc" ]; then
                BINARY="$loc"
                break
              fi
            done
          fi
          if [ -z "$BINARY" ]; then
            echo "FAIL: golangci-lint binary not found anywhere"
            exit 1
          fi
          VERSION_OUTPUT=$("$BINARY" --version 2>&1)
          echo "version output: $VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -q "2\.3\."; then
            echo "PASS: golangci-lint v2.3.x is installed"
          else
            echo "FAIL: expected version 2.3.x, got: $VERSION_OUTPUT"
            exit 1
          fi
