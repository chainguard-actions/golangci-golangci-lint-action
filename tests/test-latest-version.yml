name: Test latest version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.21'
          cache: false

      - name: Install latest golangci-lint (install-only)
        id: install
        uses: .
        with:
          version: 'latest'
          install-only: 'true'
          skip-cache: 'true'

      - name: Assert latest golangci-lint is installed
        run: |
          echo "Checking golangci-lint binary (latest)..."
          if ! command -v golangci-lint &>/dev/null; then
            echo "FAIL: golangci-lint binary not found in PATH"
            exit 1
          fi
          VERSION_OUTPUT="$(golangci-lint --version 2>&1)"
          echo "golangci-lint version: $VERSION_OUTPUT"
          if ! echo "$VERSION_OUTPUT" | grep -q "golangci-lint"; then
            echo "FAIL: unexpected version output"
            exit 1
          fi
          echo "PASS: latest golangci-lint is installed"
