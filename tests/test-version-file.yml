name: Test version-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.21'
          cache: false

      - name: Run golangci-lint with version-file input
        id: lint
        uses: .
        with:
          version-file: actions/hardened/golangci--golangci-lint-action/v9.2.1/tests/fixtures/version-file/.golangci-lint-version
          working-directory: actions/hardened/golangci--golangci-lint-action/v9.2.1/tests/fixtures/version-file
          skip-cache: 'true'
          args: --timeout=2m

      - name: Assert lint completed successfully using version-file
        run: |
          echo "golangci-lint ran successfully using version-file input"
          echo "PASS"
