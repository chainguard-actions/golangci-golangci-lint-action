name: Test working-directory input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.21'
          cache: false

      - name: Run golangci-lint with working-directory input
        id: lint
        uses: .
        with:
          version: v2.1.6
          working-directory: actions/hardened/golangci--golangci-lint-action/v9.2.1/tests/fixtures/workdir/subproject
          skip-cache: 'true'
          args: --timeout=2m

      - name: Assert lint completed successfully in working-directory
        run: |
          echo "golangci-lint ran successfully with working-directory input"
          echo "PASS"
