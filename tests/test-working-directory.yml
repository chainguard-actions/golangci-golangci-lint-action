name: Test working-directory input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Go
        run: |
          which go || (apt-get update -qq && apt-get install -y golang-go 2>/dev/null) || true
          go version || true
      - id: action
        uses: .
        with:
          version: v2.1.6
          working-directory: actions/hardened/golangci--golangci-lint-action/v9.2.1/tests/fixtures/goproject
          skip-cache: 'true'
          args: --timeout=2m
      - name: Assert lint ran successfully in working directory
        run: |
          echo "golangci-lint ran successfully in the specified working directory"
          echo "PASS"
