name: Test working-directory input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: v2.1.6
          working-directory: actions/hardened/golangci--golangci-lint-action/v9.2.0/tests/fixtures/subdir
          install-only: 'true'
          skip-cache: 'true'
      - name: Assert golangci-lint is installed and working-directory was accepted
        run: |
          VERSION=$(golangci-lint --version 2>&1 || true)
          echo "golangci-lint version output: $VERSION"
          if ! echo "$VERSION" | grep -q "2.1.6"; then
            echo "FAIL: expected golangci-lint version 2.1.6 to be installed"
            exit 1
          fi
          echo "PASS: working-directory input accepted and golangci-lint installed"
