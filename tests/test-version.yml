name: Test version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: v1.64.8
          install-only: 'true'
          skip-cache: 'true'
          verify: 'false'
      - name: Assert golangci-lint is installed
        run: |
          which golangci-lint || (echo "FAIL: golangci-lint not found in PATH" && exit 1)
          VERSION=$(golangci-lint --version 2>&1 || true)
          echo "installed version: $VERSION"
          if ! echo "$VERSION" | grep -q "1.64.8"; then
            echo "FAIL: expected version 1.64.8 but got: $VERSION"
            exit 1
          fi
          echo "PASS"
