name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.21'
          cache: false

      - name: Run golangci-lint on simple Go project
        id: lint
        uses: .
        with:
          version: 'v2.1'
          working-directory: tests/fixtures/simple-go
          skip-cache: 'true'
          args: '--timeout=60s'

      - name: Assert lint completed successfully
        run: |
          echo "golangci-lint action completed successfully"
          echo "PASS"
