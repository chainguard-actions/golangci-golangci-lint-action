name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Go
        run: |
          if ! command -v go &>/dev/null; then
            apt-get update -qq && apt-get install -y golang-go
          fi
          go version
      - id: lint
        uses: .
        with:
          args: "--config actions/hardened/golangci--golangci-lint-action/v8.0.0/tests/fixtures/goproject/.golangci.yml ./..."
          skip-cache: 'true'
          working-directory: actions/hardened/golangci--golangci-lint-action/v8.0.0/tests/fixtures/goproject
      - name: Assert lint completed successfully
        run: |
          echo "Lint step completed without error"
          echo "PASS"
